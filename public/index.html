<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель остатков МойСклад</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f5f5f7; display: flex; justify-content: center; align-content: center; height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 700px; margin: auto; }
        .hidden { display: none !important; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; margin-top: 5px; }
        button { padding: 10px 20px; background: #0071e3; color: white; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #0077ed; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .controls input { flex: 1; margin: 0; }
        .controls button { margin: 0; }
    </style>
</head>
<body>

<!-- Окно входа -->
<div id="loginBlock" class="card">
    <h2>Вход в систему</h2>
    <div class="form-group">
        <label>Логин</label>
        <input type="text" id="username" placeholder="Введите логин">
    </div>
    <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="password" placeholder="Введите пароль">
    </div>
    <button onclick="handleLogin()">Войти</button>
</div>

<!-- Окно с графиком (скрыто по умолчанию) -->
<div id="mainBlock" class="card hidden">
    <h2>История остатков товара за 30 дней</h2>
    <div class="controls">
        <input type="text" id="productId" placeholder="Вставьте UUID товара из МоегоСклада">
        <button id="btnLoad" onclick="loadChart()">Показать</button>
    </div>
    <canvas id="stockChart"></canvas>
</div>

<script>
let myChart = null;

async function handleLogin() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
    });

    if (res.ok) {
        document.getElementById('loginBlock').classList.add('hidden');
        document.getElementById('mainBlock').classList.remove('hidden');
        // Сохраняем сессию в браузере (на время открытой вкладки)
        sessionStorage.setItem('auth', 'true');
    } else {
        alert('Неверный логин или пароль');
    }
}

async function loadChart() {
    const productId = document.getElementById('productId').value;
    if (!productId) return alert('Введите ID товара');
    
    const btn = document.getElementById('btnLoad');
    btn.innerText = 'Загрузка...';
    btn.disabled = true;

    try {
        const response = await fetch(`/api/stock-history?productId=${productId}`);
        const data = await response.json();

        if (data.error) throw new Error(data.error);

        const labels = data.map(item => item.date);
        const stockValues = data.map(item => item.stock);
        const ctx = document.getElementById('stockChart').getContext('2d');
        
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Остаток (шт)',
                    data: stockValues,
                    borderColor: '#0071e3',
                    backgroundColor: 'rgba(0, 113, 227, 0.05)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.1
                }]
            },
            options: { responsive: true }
        });
    } catch (error) {
        alert('Ошибка: ' + error.message);
    } finally {
        btn.innerText = 'Показать';
        btn.disabled = false;
    }
}
</script>
</body>
</html>
